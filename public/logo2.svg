<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Sound wave circles (behind door) -->
  <circle cx="200" cy="204" r="88"  fill="none" stroke="#818cf8" stroke-width="4"   opacity="0.9"/>
  <circle cx="200" cy="204" r="120" fill="none" stroke="#818cf8" stroke-width="3"   opacity="0.6"/>
  <circle cx="200" cy="204" r="154" fill="none" stroke="#818cf8" stroke-width="2.5" opacity="0.35"/>

  <!-- Door body -->
  <rect x="148" y="114" width="104" height="164" rx="10" ry="10" fill="#4f46e5"/>

  <!-- Door frame (slight shadow/outline) -->
  <rect x="148" y="114" width="104" height="164" rx="10" ry="10"
        fill="none" stroke="#3730a3" stroke-width="2.5"/>

  <!-- Upper panel -->
  <rect x="163" y="128" width="76" height="58" rx="6" ry="6"
        fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>

  <!-- Lower panel -->
  <rect x="163" y="198" width="76" height="46" rx="6" ry="6"
        fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>

  <!-- Door handle (round knob, right side) -->
  <circle cx="238" cy="199" r="8"  fill="#a5b4fc"/>
  <circle cx="238" cy="199" r="4.5" fill="#6366f1"/>
</svg>
